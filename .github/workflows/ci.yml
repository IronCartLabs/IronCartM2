              --db-name=magento \
              --db-user=magento \
              --db-password=magento \
              --admin-firstname=ci \
              --admin-lastname=ci \
              --admin-email=ci@ironcart.dev \
              --admin-user=admin \
              --admin-password=magento-ci-123! \
