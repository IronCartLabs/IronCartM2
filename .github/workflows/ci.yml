        # Mirrors the Magento credentials check above. Fail fast with a
        # clear error if either Hyvä secret is missing rather than
        # letting composer 401 with a noisy stack trace.
        env:
          HYVA_REPO_URL: ${{ secrets.HYVA_REPO_URL }}
          HYVA_TOKEN: ${{ secrets.HYVA_TOKEN }}
        run: |
          if [ -z "${HYVA_REPO_URL}" ] || [ -z "${HYVA_TOKEN}" ]; then
            echo "::error::HYVA_REPO_URL and/or HYVA_TOKEN repo secrets are not configured."
            echo "See https://github.com/IronCartLabs/IronCartM2/issues/146 for the wiring steps."
