        # vendor/hyva-themes/ + magento-composer-installer drops it into
        # app/code/ alongside our scanner. Job-level COMPOSER_AUTH (above)
        # carries the http-basic credentials for hyva-themes.repo.packagist.com.
        working-directory: ${{ github.workspace }}/.magento
        run: |
