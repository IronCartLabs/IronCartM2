name: CI

# Hyvä integration cell restored in #146 (PR follow-up to #144). PWA Studio
# cell remains out until its docker-compose bootstrap regression is sorted.

on:
  pull_request:
  push:
    branches: [main]

# Cancel superseded runs on the same PR / branch.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  i18n:
    name: i18n CSV completeness (en_US)
    # Adobe Marketplace EQP's MEQP2.Translation.MissingI18n rule is a
    # hard submission blocker: every `__()` and `translate=` source
    # phrase must have a row in i18n/en_US.csv. This job runs the same
    # check the marketplace scanner does, so a missing phrase fails CI
    # on the PR rather than at submission time.
    #
    # No Magento source needed — the checker only reads files inside
    # the module tree, so the job is cheap and runs on every PR.
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup PHP
        uses: shivammathur/setup-php@9e72090525849c5e82e596468b86eb55e9cc5401 # v2.32.0
        with:
          php-version: '8.2'
          coverage: none

      - name: Check i18n/en_US.csv covers every __() and translate= source
        run: php bin/check-i18n.php

  lint:
    name: Lint (phpcs Magento2 + phpstan L6)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Assert composer.json carries no extra.map (regression guard, #192)
        # The legacy `extra.map` key made magento-composer-installer copy
        # the module into app/code/ on top of the vendor/ copy, producing
        # a duplicate IronCart_Scan registration that broke composer
        # installs on every published release v1.0.0–v1.5.0. Removed in
        # v1.5.1 (#192). This guard fails CI if the key is ever
        # reintroduced. Runs on every PR — no path filter, it's a
        # one-liner against the checked-out tree.
        run: |
          if jq -e '(.extra // {}) | has("map")' composer.json > /dev/null; then
            echo "::error file=composer.json::composer.json must not contain extra.map — it causes a duplicate IronCart_Scan registration that breaks composer installs on published releases. See https://github.com/IronCartLabs/IronCartM2/issues/192"
            exit 1
          fi
          echo "OK: composer.json carries no extra.map"

      - name: Setup PHP
        # Pinned to PHP 8.2 because magento/magento-coding-standard ^32
        # constrains itself to PHP ~8.1 || ~8.2. The standard still emits
        # PSR-12 violations across the whole tree regardless of the PHP
        # version that runs the linter — the constraint only affects the
        # phpcs binary's own runtime.
        uses: shivammathur/setup-php@9e72090525849c5e82e596468b86eb55e9cc5401 # v2.32.0
        with:
          php-version: '8.2'
          tools: composer:v2, cs2pr
          coverage: none

      - name: Install lint tooling
        # Globally so the module's composer.json is not touched. The
        # `dealerdirect/phpcodesniffer-composer-installer` plugin is what
        # registers the Magento2 standard with phpcs.
        run: |
          composer global config --no-plugins allow-plugins.dealerdirect/phpcodesniffer-composer-installer true
          composer global require --no-interaction --no-progress \
            squizlabs/php_codesniffer:^3.10 \
            magento/magento-coding-standard:^32 \
            phpstan/phpstan:^1.12
          echo "$HOME/.composer/vendor/bin" >> "$GITHUB_PATH"

      - name: PSR-12 / Magento Coding Standard (phpcs)
        # `-n` suppresses warnings — they are surfaced by phpcs as guidance
        # (docblock style, discouraged stdlib calls) but should not gate
        # merge. The two FinalImplementation sniff variants are excluded
        # because the constants-only Report\Severity class uses `final` +
        # private constructor as a pre-PHP-8.1 enum, which Magento2 flags
        # by default; the design is intentional and discussed in #2.
        run: |
          # Excluded sniffs, with justification:
          #   *FinalImplementation — Report\Severity legitimately uses
          #     final + private constructor as a pre-PHP-8.1 enum.
          #   Generic.PHP.NoSilencedErrors — filesystem-probing security
          #     checks (Check/Filesystem/*) intentionally silence errors
          #     when reading perm bits / owner of unreadable paths.
          #   Magento2.Functions.DiscouragedFunction — the same checks
          #     use @posix_getpwuid / @fileperms / @fileowner directly
          #     because the Magento Filesystem API doesn't expose them.
          #   Magento2.Security.IncludeFile — the registration shim
          #     `include`s a path-resolved file by design.
          # Excluded paths:
          #   bin/ — build-time CLI scripts (e.g. build-manifest.php)
          #     never loaded by Magento at runtime; they legitimately
          #     use `exit` and `passthru()` which the Magento2 standard
          #     forbids in module code.
          phpcs -n \
            --standard=Magento2 \
            --extensions=php,phtml \
            --ignore=vendor,_m2-workspace,tests/_sandbox,bin \
            --exclude=Magento2.PHP.FinalImplementation,Magento2.Classes.FinalImplementation,Generic.PHP.NoSilencedErrors,Magento2.Functions.DiscouragedFunction,Magento2.Security.IncludeFile \
            --report=full \
            --report-checkstyle=phpcs-report.xml \
            .
          cs2pr --graceful-warnings phpcs-report.xml

      - name: Write phpstan config
        run: |
          # PHPStan analyses only the pure-PHP slice of the module that
          # doesn't reference framework classes:
          #   - Report/ReportBuilder.php (array shape builder)
          #   - Report/Severity.php (constants-only)
          #   - Report/FindingDetailFormatter.php (admin-grid detail
          #     formatter, pure pipeline — no Magento types)
          #
          # Excluded paths reference classes that aren't on the autoload
          # classpath without `composer install` against repo.magento.com
          # or symfony/console (which itself comes via magento metapackage):
          #   - Console/ — Symfony\Component\Console + Magento\Framework
          #   - Report/ReportRenderer.php — Symfony\Component\Console
          #   - registration.php — Magento\Framework\Component\ComponentRegistrar
          #   - Test/Unit/ — PHPUnit\Framework\TestCase
          # Those paths are validated end-to-end by the integration job
          # inside the docker-compose Magento sandbox. Tightening this
          # scope is tracked as a follow-up to #8.
          cat > phpstan.neon <<'NEON'
          parameters:
            level: 6
            paths:
              - Report/ReportBuilder.php
              - Report/Severity.php
              - Report/FindingDetailFormatter.php
              - Report/FindingCountExtractor.php
            excludePaths:
              - vendor
              - _m2-workspace
          NEON

      - name: PHPStan level 6
        run: phpstan analyse --no-progress --error-format=github

  unit:
    name: Unit (PHPUnit / PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # 8.4 added in #176 ahead of the composer.json `require.php`
        # widening tracked separately in #154. The "Generate vendor
        # autoloader" step below also strips `require.php` from the
        # rewritten composer.json so the existing
        # `~8.1.0||~8.2.0||~8.3.0` floor does not refuse to install
        # the dev deps on the 8.4 cell. The strip is CI-only and never
        # touches the published composer.json — the rewrite happens to
        # a copy and is restored before the job ends.
        php: ['8.1', '8.2', '8.3', '8.4']
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@9e72090525849c5e82e596468b86eb55e9cc5401 # v2.32.0
        with:
          php-version: ${{ matrix.php }}
          tools: composer:v2, phpunit:10
          coverage: none

      - name: Generate vendor autoloader (no magento/framework)
        # The module's composer.json requires magento/framework, which is
        # only published on repo.magento.com (auth required). For unit
        # tests we rewrite composer.json in-place to:
        #   - drop the magento/framework requirement
        #   - drop autoload.files (registration.php executes
        #     ComponentRegistrar::register() at autoload time, which would
        #     blow up without magento/framework)
        #   - drop require.php so the current
        #     `~8.1.0||~8.2.0||~8.3.0` floor does not refuse to install on
        #     PHP 8.4 (the 8.4 cell is allowed in CI ahead of #154's
        #     composer widening).
        # symfony/console is declared as require-dev in composer.json so
        # it satisfies the ReportRenderer tests' BufferedOutput import
        # without any further CI surgery.
        # The original composer.json is restored so the working tree is
        # unchanged for any subsequent steps.
        run: |
          cp composer.json composer.json.bak
          php -r '
            $j = json_decode(file_get_contents("composer.json"), true);
            unset($j["require"]["magento/framework"]);
            unset($j["require"]["php"]);
            unset($j["autoload"]["files"]);
            file_put_contents("composer.json", json_encode($j, JSON_PRETTY_PRINT | JSON_UNESCAPED_SLASHES));
          '
          composer install --no-interaction --no-progress --no-scripts --no-plugins
          mv composer.json.bak composer.json

      - name: Write phpunit config (CI override)
        # At v0 the unit job runs without magento/framework on the
        # classpath (see "Generate vendor autoloader" step above). That
        # means any test under Test/Unit that touches Magento types fails
        # at autoload. We restrict the testsuite to Test/Unit/Report (the
        # Magento-free slice authored alongside the v0 report schema in
        # #2). Magento-dependent test subtrees (Test/Unit/Check/**, etc.)
        # are validated end-to-end by the integration job inside the
        # docker-compose Magento sandbox. We always write phpunit.xml
        # here so the test scope is deterministic regardless of whatever
        # phpunit.xml the repo grows over time — the override is
        # CI-specific and never persists to the working tree.
        run: |
          mkdir -p Test/Unit/Report
          cat > phpunit.xml <<'XML'
          <?xml version="1.0" encoding="UTF-8"?>
          <phpunit
            xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
            bootstrap="vendor/autoload.php"
            colors="true">
            <testsuites>
              <testsuite name="unit">
                <directory>Test/Unit/Report</directory>
              </testsuite>
            </testsuites>
          </phpunit>
          XML

      - name: PHPUnit (Test/Unit/Report/**)
        run: phpunit --testsuite=unit --do-not-cache-result

  integration:
    name: Integration (Magento ${{ matrix.magento }} / PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    needs: [lint, unit]
    # Gated on the `INTEGRATION_ENABLED` repo variable. The integration
    # cell needs the MAGENTO_PUBLIC_KEY / MAGENTO_PRIVATE_KEY repo secrets
    # to `composer create-project` against repo.magento.com. Until those
    # secrets are wired and INTEGRATION_ENABLED is set to 'true', this
    # job is skipped rather than failed — see #18.
    if: ${{ vars.INTEGRATION_ENABLED == 'true' }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        # Default smoke cell: latest patched Magento × latest PHP. The
        # full compat matrix runs only when the PR is labelled `v0` or
        # on pushes to `main` — see the `integration-full-matrix` job
        # below. This keeps free-tier GHA minutes lean on PRs.
        #
        # Why `2.4.8-p2` and not bare `2.4.8`:
        #   - Adobe Security Bulletin APSB25-50 (June 2025) ships
        #     cumulative security fixes via 2.4.8-p2; composer's
        #     `block-insecure` policy refuses to install any earlier
        #     2.4.8 patch level whose advisories sit above the active
        #     security floor.
        #   - We stop short of -p4/-p5 deliberately: those are the
        #     newest 2.4.8 patches at PR time (5 patches available
        #     upstream) and the 2.4.7 cell sits at -p5 for the
        #     analogous "stop at the highest patch known to be clean
        #     on the runner PHP" reason. Bumping later cells to -p3+
        #     is fine once they've been confirmed clean on PHP 8.4
        #     and composer 2.9 by a separate run — out of scope for
        #     #176, which only adds the cell.
        magento: ['2.4.8-p2']
        php: ['8.4']
    steps:
      - name: Checkout module
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          path: module

      - name: Setup PHP ${{ matrix.php }}
        # PHP on the runner is only used to drive composer
        # create-project. The actual Magento install runs inside the
        # docker-compose stack (markshust/magento-php:<php>-fpm).
        #
        # composer:v2.9 (not the generic v2) is pinned because Magento
        # 2.4.8's `composer create-project` requires composer 2.9.3+ to
        # resolve `magento/framework ^104.0` and the bundled
        # marketplace-composer-installer correctly. The integration-hyva
        # and integration-full-matrix jobs use the same pin for
        # consistency across the matrix.
        uses: shivammathur/setup-php@9e72090525849c5e82e596468b86eb55e9cc5401 # v2.32.0
        with:
          php-version: ${{ matrix.php }}
          tools: composer:v2.9
          extensions: bcmath, ctype, curl, dom, gd, hash, iconv, intl, mbstring, openssl, pdo_mysql, simplexml, soap, sockets, sodium, tokenizer, xmlwriter, xsl, zip
          coverage: none

      - name: Verify Magento Composer credentials are present
        # Fail fast with a clear error if the secrets are missing rather
        # than letting composer 401 with a noisy stack trace.
        env:
          MAGENTO_PUBLIC_KEY: ${{ secrets.MAGENTO_PUBLIC_KEY }}
          MAGENTO_PRIVATE_KEY: ${{ secrets.MAGENTO_PRIVATE_KEY }}
        run: |
          if [ -z "${MAGENTO_PUBLIC_KEY}" ] || [ -z "${MAGENTO_PRIVATE_KEY}" ]; then
            echo "::error::MAGENTO_PUBLIC_KEY and/or MAGENTO_PRIVATE_KEY repo secrets are not configured."
            echo "See https://github.com/IronCartLabs/IronCartM2/issues/18 for the wiring steps."
            exit 1
          fi

      - name: Resolve markoshust/magento-php digest for PHP ${{ matrix.php }}
        # Pin the Magento sandbox image to a sha256 digest so the
        # integration cell is reproducible. The previous floating-tag
        # version (`markoshust/magento-php:<php>-fpm`) was flagged by
        # the agent:security review on #18 / PR #32 as a non-blocking
        # supply-chain risk: a forced or compromised retag would land
        # silently on the next CI run.
        #
        # Digests are the multi-arch manifest-list digests (so the
        # image works on both amd64 and arm64 runners), captured from
        # Docker Hub on the dates in the trailing comments. The 8.x-fpm
        # tags have been stable for ~13 months at the time of pin
        # (last_pushed 2025-04-17 / 2025-04-18 / 2026-05-20).
        #
        # Bumping: re-run
        #   curl https://hub.docker.com/v2/repositories/markoshust/magento-php/tags/<php>-fpm
        # take the `digest` field, paste it here, and note the
        # last_updated timestamp in the PR description.
        run: |
          case "${{ matrix.php }}" in
            8.2) digest="sha256:c7693a6843134ea0e834f72a09b7fa0b48d864f194c3b04a1aa609fc5c45d7ec" ;;  # last_updated 2025-04-18T18:45:08Z
            8.3) digest="sha256:6905c3be235500c31d84029e1ec3e1d31d2b46959eda1ec73554a709d9f8c687" ;;  # last_updated 2025-04-17T22:58:36Z
            8.4) digest="sha256:6a4a7a7248a8700ac85b530374ffbc21687bc8bf9436519a2832d992757fc0c6" ;;  # last_updated 2026-05-20T18:32:24Z
            *)
              echo "::error::No pinned markoshust/magento-php digest for PHP ${{ matrix.php }}. Add one to this step in .github/workflows/ci.yml."
              exit 1
              ;;
          esac
          echo "MAGENTO_PHP_IMAGE=markoshust/magento-php@${digest}" >> "${GITHUB_ENV}"

      - name: Select sidecar versions for Magento ${{ matrix.magento }}
        # Magento 2.4.8 raised the supported floor for its sidecar stack
        # (MariaDB 11.4 LTS or 10.6, OpenSearch 2.19+ inside the 2.x LTS
        # branch, Valkey 8 as the Redis 7 replacement). The default
        # `tests/sandbox/docker-compose.yml` images target 2.4.7; we
        # override per-cell via env so the compose file stays usable for
        # local 2.4.7 sandbox debugging without modification.
        run: |
          case "${{ matrix.magento }}" in
            2.4.8-*)
              echo "MARIADB_IMAGE=mariadb:11.4" >> "${GITHUB_ENV}"
              echo "OPENSEARCH_IMAGE=opensearchproject/opensearch:2.19.1" >> "${GITHUB_ENV}"
              echo "REDIS_IMAGE=valkey/valkey:8-alpine" >> "${GITHUB_ENV}"
              ;;
            *)
              # 2.4.7 (and prior cells, if any are reintroduced) keep
              # the compose defaults: mariadb:10.6 / opensearch:2.11.1
              # / redis:7-alpine. No env exports needed.
              ;;
          esac

      - name: Prepare Magento source (composer create-project)
        env:
          MAGENTO_VERSION: ${{ matrix.magento }}
          # COMPOSER_AUTH is composer's standard env-var override for
          # auth.json. We embed the secrets via env so they never appear
          # in the workflow file or on disk in a clear-text auth.json.
          COMPOSER_AUTH: |
            {
              "http-basic": {
                "repo.magento.com": {
                  "username": "${{ secrets.MAGENTO_PUBLIC_KEY }}",
                  "password": "${{ secrets.MAGENTO_PRIVATE_KEY }}"
                }
              }
            }
        run: |
          set -euo pipefail
          # Materialise Magento source at $GITHUB_WORKSPACE/.magento so
          # the compose file (which uses ${MAGENTO_SRC_HOST}) can bind-
          # mount it into the magento container.
          composer create-project \
            --no-interaction \
            --no-progress \
            --no-install \
            --repository-url=https://repo.magento.com/ \
            magento/project-community-edition:${MAGENTO_VERSION} \
            "${GITHUB_WORKSPACE}/.magento"
          # `--no-install` skipped the heavy resolve; do it now so the
          # vendor/ tree is populated before we bind-mount into the
          # container. Running composer install on the host instead of
          # inside the container is markedly faster on GHA runners
          # because of the ext-zip + ext-curl native speed-up.
          (
            cd "${GITHUB_WORKSPACE}/.magento"
            composer install --no-interaction --no-progress
          )

      - name: Drop module into Magento app/code/IronCart/Scan
        # Architectural fix for issue #34, bug 4 — see issue body for the
        # full chain. Previously the workflow did
        # `composer require ironcartlabs/magento-scan:@dev` from a `path`
        # repository pointing at the bind-mounted module, which:
        #   - tripped the host→container COMPOSER_AUTH forwarding gap
        #     (bug 1),
        #   - tripped git "dubious ownership" inside the container (bug 2),
        #   - tripped a chmod() ownership failure from magento-composer-
        #     installer's post-install hook (bug 3),
        #   - and finally produced a duplicate registration of
        #     IronCart_Scan from `vendor/ironcartlabs/magento-scan`
        #     (path-repo source) AND `app/code/IronCart/Scan` (magento-
        #     composer-installer copy), aborting `bin/magento` (bug 4).
        #
        # The canonical way to test a Magento module in CI is to drop it
        # into `app/code/<vendor>/<module>` on the prepared source tree
        # before booting the container. Magento auto-discovers anything
        # in `app/code/`, and there's no composer round-trip inside the
        # container so bugs 1-3 evaporate too. Bug 5 (the spurious phpcs
        # installed_paths warning) also disappears because we no longer
        # run `composer require` inside the container.
        env:
          MODULE_DEST: ${{ github.workspace }}/.magento/app/code/IronCart/Scan
        run: |
          set -euo pipefail
          mkdir -p "${MODULE_DEST}"
          # Copy the module checkout (the `module/` path set by the
          # checkout step above) into the Magento source. Exclude .git
          # because Magento walks the tree at boot and large .git/objects
          # trees would just slow it down for no benefit.
          rsync -a --delete --exclude='.git' --exclude='_m2-workspace' \
            "${GITHUB_WORKSPACE}/module/" "${MODULE_DEST}/"

      - name: Align bind-mount ownership with container uid 1000
        # Bug 3 fix from issue #34. markoshust/magento-php runs as the
        # `app` user (uid 1000) but the GHA runner writes files as uid
        # 1001. Magento's `setup:install` / `setup:upgrade` need to
        # create generated/, var/, pub/static/ and the app/code/ tree
        # inherits the same uid mismatch. `chmod a+rwX` is not enough —
        # chmod(2) itself requires file ownership in some kernel paths
        # (e.g. magento-composer-installer's perm fixups). GHA runners
        # have passwordless sudo, so we chown the entire prepared tree
        # to 1000:1000 before booting the container.
        run: |
          sudo chown -R 1000:1000 "${GITHUB_WORKSPACE}/.magento"

      - name: Boot Magento sandbox (MariaDB + OpenSearch + Redis)
        working-directory: module
        env:
          PHP_VERSION: ${{ matrix.php }}
          MAGENTO_SRC_HOST: ${{ github.workspace }}/.magento
        run: |
          docker compose -f tests/sandbox/docker-compose.yml up -d --wait
          docker compose -f tests/sandbox/docker-compose.yml ps

      - name: Install Magento + enable module
        working-directory: module
        env:
          PHP_VERSION: ${{ matrix.php }}
          MAGENTO_SRC_HOST: ${{ github.workspace }}/.magento
        run: |
          set -euo pipefail
          # No `composer require` here — the module is already in
          # app/code/IronCart/Scan from the previous step. Magento's
          # ComponentRegistrar auto-discovers it at setup:install time.
          docker compose -f tests/sandbox/docker-compose.yml exec -T magento bash -lc '
            set -euo pipefail
            cd /var/www/html
            bin/magento setup:install \
              --base-url=http://magento.test/ \
              --db-host=mariadb \
              --db-name=magento \
              --db-user=magento \
              --db-password=magento \
              --admin-firstname=ci \
              --admin-lastname=ci \
              --admin-email=ci@ironcart.dev \
              --admin-user=admin \
              --admin-password=magento-ci-123! \
              --language=en_US \
              --currency=USD \
              --timezone=UTC \
              --use-rewrites=1 \
              --search-engine=opensearch \
              --opensearch-host=opensearch \
              --opensearch-port=9200 \
              --session-save=redis \
              --session-save-redis-host=redis \
              --cache-backend=redis \
              --cache-backend-redis-server=redis
            bin/magento module:enable IronCart_Scan
            bin/magento setup:upgrade
          '

      - name: Run ironcart:scan and assert exit 0 + valid JSON
        working-directory: module
        env:
          PHP_VERSION: ${{ matrix.php }}
          MAGENTO_SRC_HOST: ${{ github.workspace }}/.magento
        run: |
          docker compose -f tests/sandbox/docker-compose.yml exec -T magento bash -lc '
            set -euo pipefail
            cd /var/www/html
            bin/magento ironcart:scan --format=json > /tmp/scan.json
          '
          docker compose -f tests/sandbox/docker-compose.yml cp magento:/tmp/scan.json ./scan.json
          python3 - <<'PY'
          import json
          with open('scan.json') as f:
              data = json.load(f)
          assert isinstance(data, dict), 'top-level must be object'
          assert data.get('schema_version') == 'v0', f'schema_version: {data.get("schema_version")}'
          assert 'findings' in data and isinstance(data['findings'], list)
          assert 'summary' in data and isinstance(data['summary'], dict)
          # IC-072 — composer-lock integrity. A clean sandbox install must
          # produce zero IC-072 HIGH findings; if it does, either the
          # bundled manifest is wrong for the cell's Magento version, or
          # the sandbox composer cache served a tampered package.
          ic072 = [f for f in data['findings'] if f.get('id') == 'IC-072']
          assert ic072 == [], f'unexpected IC-072 findings on clean install: {ic072}'
          print('scan.json OK:', json.dumps(data['summary']))
          PY

      - name: Surface sandbox logs on failure
        if: failure()
        working-directory: module
        env:
          PHP_VERSION: ${{ matrix.php }}
          MAGENTO_SRC_HOST: ${{ github.workspace }}/.magento
        run: docker compose -f tests/sandbox/docker-compose.yml logs --no-color --tail=200

      - name: Tear down sandbox
        if: always()
        working-directory: module
        env:
          PHP_VERSION: ${{ matrix.php }}
          MAGENTO_SRC_HOST: ${{ github.workspace }}/.magento
        run: docker compose -f tests/sandbox/docker-compose.yml down --volumes --remove-orphans

  integration-composer:
    name: Integration (composer install) — Magento ${{ matrix.magento }} / PHP ${{ matrix.php }}
    runs-on: ubuntu-latest
    needs: [lint, unit]
    # Structural guard for the #192 bug class (issue #197). The other
    # integration cells copy the module straight into app/code/ — the
    # canonical fast path adopted in #34 — which means CI never exercises
    # the install path merchants actually use: `composer require
    # ironcartlabs/magento-scan`, acted on by Magento's bundled
    # `magento/magento-composer-installer` plugin. #192 (duplicate
    # IronCart_Scan registration from a legacy `extra.map`) shipped in
    # every release v1.0.0–v1.5.0 precisely because the sandbox never ran
    # that flow. This cell installs the module via `composer require` from
    # a path repository inside the container (no Packagist round-trip) and
    # asserts single component registration at `bin/magento` bootstrap.
    #
    # The #34 failure modes that killed the original composer-based
    # install path are each engineered out rather than re-tripped — see
    # the design comment on #197 for the full table:
    #   bug 1 (COMPOSER_AUTH not forwarded)  → step env + explicit
    #          `docker compose exec -e COMPOSER_AUTH=…` forwarding
    #   bug 2 (git dubious ownership)        → staged source has no .git;
    #          version pinned via the path repo's `options.versions`, so
    #          composer never shells out to git at all
    #   bug 3 (chmod ownership failure)      → composer runs in-container
    #          as uid 1000 against a tree chowned 1000:1000 pre-boot
    #   bug 4 (duplicate registration)       → no longer a failure mode to
    #          dodge: it is the regression this cell exists to detect
    # Same INTEGRATION_ENABLED gate as the other integration cells.
    if: ${{ vars.INTEGRATION_ENABLED == 'true' }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        # Mirrors the default `integration` smoke cell — latest patched
        # Magento × latest PHP. One cell only: the point is install-path
        # fidelity, not compat fan-out (the full matrix covers that).
        magento: ['2.4.8-p2']
        php: ['8.4']
    steps:
      - name: Checkout module
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          path: module

      - name: Setup PHP ${{ matrix.php }}
        # composer:v2.9 pinned for Magento 2.4.8 compatibility — see the
        # matching step on the `integration` job for the rationale.
        uses: shivammathur/setup-php@9e72090525849c5e82e596468b86eb55e9cc5401 # v2.32.0
        with:
          php-version: ${{ matrix.php }}
          tools: composer:v2.9
          extensions: bcmath, ctype, curl, dom, gd, hash, iconv, intl, mbstring, openssl, pdo_mysql, simplexml, soap, sockets, sodium, tokenizer, xmlwriter, xsl, zip
          coverage: none

      - name: Verify Magento Composer credentials are present
        env:
          MAGENTO_PUBLIC_KEY: ${{ secrets.MAGENTO_PUBLIC_KEY }}
          MAGENTO_PRIVATE_KEY: ${{ secrets.MAGENTO_PRIVATE_KEY }}
        run: |
          if [ -z "${MAGENTO_PUBLIC_KEY}" ] || [ -z "${MAGENTO_PRIVATE_KEY}" ]; then
            echo "::error::MAGENTO_PUBLIC_KEY and/or MAGENTO_PRIVATE_KEY repo secrets are not configured."
            echo "See https://github.com/IronCartLabs/IronCartM2/issues/18 for the wiring steps."
            exit 1
          fi

      - name: Resolve markoshust/magento-php digest for PHP ${{ matrix.php }}
        # See the matching step on the `integration` job for the rationale
        # and the bump procedure. Digests must stay in sync across all
        # integration jobs.
        run: |
          case "${{ matrix.php }}" in
            8.2) digest="sha256:c7693a6843134ea0e834f72a09b7fa0b48d864f194c3b04a1aa609fc5c45d7ec" ;;  # last_updated 2025-04-18T18:45:08Z
            8.3) digest="sha256:6905c3be235500c31d84029e1ec3e1d31d2b46959eda1ec73554a709d9f8c687" ;;  # last_updated 2025-04-17T22:58:36Z
            8.4) digest="sha256:6a4a7a7248a8700ac85b530374ffbc21687bc8bf9436519a2832d992757fc0c6" ;;  # last_updated 2026-05-20T18:32:24Z
            *)
              echo "::error::No pinned markoshust/magento-php digest for PHP ${{ matrix.php }}. Add one to this step in .github/workflows/ci.yml."
              exit 1
              ;;
          esac
          echo "MAGENTO_PHP_IMAGE=markoshust/magento-php@${digest}" >> "${GITHUB_ENV}"

      - name: Select sidecar versions for Magento ${{ matrix.magento }}
        # See the matching step on the `integration` job for rationale.
        run: |
          case "${{ matrix.magento }}" in
            2.4.8-*)
              echo "MARIADB_IMAGE=mariadb:11.4" >> "${GITHUB_ENV}"
              echo "OPENSEARCH_IMAGE=opensearchproject/opensearch:2.19.1" >> "${GITHUB_ENV}"
              echo "REDIS_IMAGE=valkey/valkey:8-alpine" >> "${GITHUB_ENV}"
              ;;
            *)
              ;;
          esac

      - name: Prepare Magento source (composer create-project)
        env:
          MAGENTO_VERSION: ${{ matrix.magento }}
          COMPOSER_AUTH: |
            {
              "http-basic": {
                "repo.magento.com": {
                  "username": "${{ secrets.MAGENTO_PUBLIC_KEY }}",
                  "password": "${{ secrets.MAGENTO_PRIVATE_KEY }}"
                }
              }
            }
        run: |
          set -euo pipefail
          composer create-project \
            --no-interaction \
            --no-progress \
            --no-install \
            --repository-url=https://repo.magento.com/ \
            magento/project-community-edition:${MAGENTO_VERSION} \
            "${GITHUB_WORKSPACE}/.magento"
          (
            cd "${GITHUB_WORKSPACE}/.magento"
            composer install --no-interaction --no-progress
          )

      - name: Stage module as path-repo source (no app/code drop)
        # Unlike the other integration cells, the module is NOT copied
        # into app/code/IronCart/Scan. It is staged as a pristine source
        # dir inside the bind-mounted Magento tree so the container can
        # install it the way merchants do: `composer require`, acted on
        # by magento/magento-composer-installer.
        #
        # `.git` is deliberately excluded: with no VCS metadata in the
        # source dir, composer never shells out to git, so the "dubious
        # ownership" failure (#34 bug 2) is structurally impossible. The
        # package version comes from the path repository's
        # `options.versions` instead (see the install step below).
        env:
          MODULE_SRC: ${{ github.workspace }}/.magento/ironcart-src
        run: |
          set -euo pipefail
          mkdir -p "${MODULE_SRC}"
          rsync -a --delete --exclude='.git' --exclude='_m2-workspace' \
            "${GITHUB_WORKSPACE}/module/" "${MODULE_SRC}/"

      - name: Align bind-mount ownership with container uid 1000
        # Bug 3 fix from #34 — see the matching step on the `integration`
        # job. Container runs as uid 1000; runner writes as uid 1001. In
        # this cell the chown also covers ironcart-src/, so the in-
        # container `composer require` (running as `app`, uid 1000) owns
        # every file magento-composer-installer's chmod hook may touch.
        run: |
          sudo chown -R 1000:1000 "${GITHUB_WORKSPACE}/.magento"

      - name: Boot Magento sandbox (MariaDB + OpenSearch + Redis)
        working-directory: module
        env:
          PHP_VERSION: ${{ matrix.php }}
          MAGENTO_SRC_HOST: ${{ github.workspace }}/.magento
        run: |
          docker compose -f tests/sandbox/docker-compose.yml up -d --wait
          docker compose -f tests/sandbox/docker-compose.yml ps

      - name: Install Magento (no module yet)
        # Plain `setup:install` on a module-free tree. Merchants run
        # `composer require ironcartlabs/magento-scan` against an already
        # installed store, so this cell installs Magento first and adds
        # the module via composer afterwards.
        working-directory: module
        env:
          PHP_VERSION: ${{ matrix.php }}
          MAGENTO_SRC_HOST: ${{ github.workspace }}/.magento
        run: |
          set -euo pipefail
          docker compose -f tests/sandbox/docker-compose.yml exec -T magento bash -lc '
            set -euo pipefail
            cd /var/www/html
            bin/magento setup:install \
              --base-url=http://magento.test/ \
              --db-host=mariadb \
              --db-name=magento \
              --db-user=magento \
              --db-password=magento \
              --admin-firstname=ci \
              --admin-lastname=ci \
              --admin-email=ci@ironcart.dev \
              --admin-user=admin \
              --admin-password=magento-ci-123! \
              --language=en_US \
              --currency=USD \
              --timezone=UTC \
              --use-rewrites=1 \
              --search-engine=opensearch \
              --opensearch-host=opensearch \
              --opensearch-port=9200 \
              --session-save=redis \
              --session-save-redis-host=redis \
              --cache-backend=redis \
              --cache-backend-redis-server=redis
          '

      - name: Install module via composer require (path repo, in-container)
        # The merchant install path. Runs inside the container as the
        # `app` user so Magento's bundled magento-composer-installer
        # plugin acts on the package exactly as it does on a real store.
        #
        # COMPOSER_AUTH is rebuilt from the repo secrets at step level
        # and forwarded explicitly via `docker compose exec -e` — the
        # host→container forwarding gap was #34 bug 1. The require is a
        # partial update against the already-locked tree, so magento/*
        # stays pinned from composer.lock; the auth is belt-and-braces
        # for the repo.magento.com metadata round-trip.
        #
        # The path repository pins the package version to 9999.9.9 via
        # `options.versions` (no .git in the staged source → composer
        # never invokes git → #34 bug 2 cannot occur) and forces
        # `symlink: false` so vendor/ gets a real copy — a symlink would
        # dangle outside the project tree and was half of #34 bug 4.
        # 9999.9.9 can never resolve from Packagist (public ceiling is
        # 1.x), so the cell always installs the PR's code with no
        # Packagist round-trip.
        working-directory: module
        env:
          PHP_VERSION: ${{ matrix.php }}
          MAGENTO_SRC_HOST: ${{ github.workspace }}/.magento
          COMPOSER_AUTH: |
            {
              "http-basic": {
                "repo.magento.com": {
                  "username": "${{ secrets.MAGENTO_PUBLIC_KEY }}",
                  "password": "${{ secrets.MAGENTO_PRIVATE_KEY }}"
                }
              }
            }
        run: |
          set -euo pipefail
          repo_json='{"type": "path", "url": "ironcart-src", "options": {"symlink": false, "versions": {"ironcartlabs/magento-scan": "9999.9.9"}}}'
          docker compose -f tests/sandbox/docker-compose.yml exec -T \
            -e COMPOSER_AUTH="${COMPOSER_AUTH}" \
            -e IRONCART_REPO_JSON="${repo_json}" \
            magento bash -lc '
              set -euo pipefail
              cd /var/www/html
              composer config repositories.ironcart "${IRONCART_REPO_JSON}"
              composer require --no-interaction --no-progress ironcartlabs/magento-scan:9999.9.9
            '

      - name: "Assert single component registration (the #192 guard)"
        # This is the assertion #192 proved was missing: a composer
        # install must register IronCart_Scan exactly once, from vendor/.
        # On the #192 bug class (legacy `extra.map` → magento-composer-
        # installer copies the package into app/code/ alongside the
        # vendor autoload registration), every bin/magento invocation
        # aborts at bootstrap with "Module 'IronCart_Scan' from '…' has
        # been already defined in '…'".
        #
        # Note: `bin/magento module:status <name>` exits 0 regardless of
        # the per-module result (ModuleStatusCommand::execute() discards
        # showSpecificModule()'s return code), so the exit code is not a
        # valid oracle — the assertions grep the output instead.
        working-directory: module
        env:
          PHP_VERSION: ${{ matrix.php }}
          MAGENTO_SRC_HOST: ${{ github.workspace }}/.magento
        run: |
          set -euo pipefail
          docker compose -f tests/sandbox/docker-compose.yml exec -T magento bash -lc '
            set -euo pipefail
            cd /var/www/html
            # 1. composer installed a real copy into vendor/ (not a symlink).
            test -f vendor/ironcartlabs/magento-scan/registration.php
            test ! -L vendor/ironcartlabs/magento-scan
            # 2. magento-composer-installer made no app/code copy — the
            #    on-disk signature of the #192 bug class.
            if [ -e app/code/IronCart/Scan ]; then
              echo "::error::app/code/IronCart/Scan exists after composer require — duplicate on-disk registration, the #192 bug class (see issues #192 / #197)."
              exit 1
            fi
            # 3. bin/magento bootstraps and answers module:status. A
            #    duplicate registration aborts before command dispatch.
            rc=0
            out=$(bin/magento module:status IronCart_Scan 2>&1) || rc=$?
            printf "%s\n" "${out}"
            if printf "%s" "${out}" | grep -qi "has been already defined"; then
              echo "::error::Duplicate IronCart_Scan registration at bin/magento bootstrap — the #192 bug class (see issues #192 / #197)."
              exit 1
            fi
            if [ "${rc}" -ne 0 ]; then
              echo "::error::bin/magento module:status failed (exit ${rc}) — bootstrap broken after composer install."
              exit 1
            fi
            printf "%s" "${out}" | grep -Eq "Module is (enabled|disabled)"
          '

      - name: Enable module + setup:upgrade
        # Both commands bootstrap bin/magento again, so they double as
        # registration guards on top of the dedicated assertion step.
        working-directory: module
        env:
          PHP_VERSION: ${{ matrix.php }}
          MAGENTO_SRC_HOST: ${{ github.workspace }}/.magento
        run: |
          set -euo pipefail
          docker compose -f tests/sandbox/docker-compose.yml exec -T magento bash -lc '
            set -euo pipefail
            cd /var/www/html
            bin/magento module:enable IronCart_Scan
            bin/magento setup:upgrade
          '

      - name: Run ironcart:scan and assert exit 0 + valid JSON
        # Same assertion as the other integration cells. The composer-
        # installed package lands in the sandbox composer.lock, but
        # IC-072 ignores packages absent from the bundled reference
        # manifest, so the zero-IC-072 assertion stays valid here.
        working-directory: module
        env:
          PHP_VERSION: ${{ matrix.php }}
          MAGENTO_SRC_HOST: ${{ github.workspace }}/.magento
        run: |
          docker compose -f tests/sandbox/docker-compose.yml exec -T magento bash -lc '
            set -euo pipefail
            cd /var/www/html
            bin/magento ironcart:scan --format=json > /tmp/scan.json
          '
          docker compose -f tests/sandbox/docker-compose.yml cp magento:/tmp/scan.json ./scan.json
          python3 - <<'PY'
          import json
          with open('scan.json') as f:
              data = json.load(f)
          assert isinstance(data, dict), 'top-level must be object'
          assert data.get('schema_version') == 'v0', f'schema_version: {data.get("schema_version")}'
          assert 'findings' in data and isinstance(data['findings'], list)
          assert 'summary' in data and isinstance(data['summary'], dict)
          # IC-072 — composer-lock integrity. A clean sandbox install must
          # produce zero IC-072 HIGH findings; if it does, either the
          # bundled manifest is wrong for the cell's Magento version, or
          # the sandbox composer cache served a tampered package.
          ic072 = [f for f in data['findings'] if f.get('id') == 'IC-072']
          assert ic072 == [], f'unexpected IC-072 findings on clean install: {ic072}'
          print('scan.json OK:', json.dumps(data['summary']))
          PY

      - name: Surface sandbox logs on failure
        if: failure()
        working-directory: module
        env:
          PHP_VERSION: ${{ matrix.php }}
          MAGENTO_SRC_HOST: ${{ github.workspace }}/.magento
        run: docker compose -f tests/sandbox/docker-compose.yml logs --no-color --tail=200

      - name: Tear down sandbox
        if: always()
        working-directory: module
        env:
          PHP_VERSION: ${{ matrix.php }}
          MAGENTO_SRC_HOST: ${{ github.workspace }}/.magento
        run: docker compose -f tests/sandbox/docker-compose.yml down --volumes --remove-orphans

  integration-hyva:
    name: Integration (Hyvä) — Magento ${{ matrix.magento }} / PHP ${{ matrix.php }}
    runs-on: ubuntu-latest
    needs: [lint, unit]
    # Same gate as the other integration cells — needs MAGENTO_* repo
    # secrets for `composer create-project` against repo.magento.com,
    # plus the HYVA_REPO_URL / HYVA_TOKEN secrets to pull the Hyvä
    # theme module from the private Packagist mirror at
    # hyva-themes.repo.packagist.com.
    if: ${{ vars.INTEGRATION_ENABLED == 'true' }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        # Matches the default `integration` cell — single latest-patched
        # smoke. The point of this cell is to confirm the scanner does
        # not regress when the Hyvä theme module is present in the
        # Magento source tree; we don't need the full compat fan-out.
        # Hyvä's `hyva-themes/magento2-theme-module` composer constraint
        # supports Magento 2.4.4 through 2.4.8 inclusive (verified at
        # PR time against the public hyva-themes-base composer.json), so
        # bumping the cell to 2.4.8 × 8.4 in lock-step with the default
        # `integration` cell does not require a theme-module bump.
        magento: ['2.4.8-p2']
        php: ['8.4']
    # Job-level COMPOSER_AUTH carries both registries so every composer
    # call in the job (create-project, install, require) can talk to
    # repo.magento.com AND hyva-themes.repo.packagist.com.
    env:
      COMPOSER_AUTH: |
        {
          "http-basic": {
            "repo.magento.com": {
              "username": "${{ secrets.MAGENTO_PUBLIC_KEY }}",
              "password": "${{ secrets.MAGENTO_PRIVATE_KEY }}"
            },
            "hyva-themes.repo.packagist.com": {
              "username": "token",
              "password": "${{ secrets.HYVA_TOKEN }}"
            }
          }
        }
    steps:
      - name: Checkout module
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          path: module

      - name: Setup PHP ${{ matrix.php }}
        # composer:v2.9 pinned for Magento 2.4.8 compatibility — see the
        # matching step on the `integration` job for the rationale.
        uses: shivammathur/setup-php@9e72090525849c5e82e596468b86eb55e9cc5401 # v2.32.0
        with:
          php-version: ${{ matrix.php }}
          tools: composer:v2.9
          extensions: bcmath, ctype, curl, dom, gd, hash, iconv, intl, mbstring, openssl, pdo_mysql, simplexml, soap, sockets, sodium, tokenizer, xmlwriter, xsl, zip
          coverage: none

      - name: Verify Magento Composer credentials are present
        env:
          MAGENTO_PUBLIC_KEY: ${{ secrets.MAGENTO_PUBLIC_KEY }}
          MAGENTO_PRIVATE_KEY: ${{ secrets.MAGENTO_PRIVATE_KEY }}
        run: |
          if [ -z "${MAGENTO_PUBLIC_KEY}" ] || [ -z "${MAGENTO_PRIVATE_KEY}" ]; then
            echo "::error::MAGENTO_PUBLIC_KEY and/or MAGENTO_PRIVATE_KEY repo secrets are not configured."
            echo "See https://github.com/IronCartLabs/IronCartM2/issues/18 for the wiring steps."
            exit 1
